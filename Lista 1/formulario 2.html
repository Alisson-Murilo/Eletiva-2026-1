<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <main class="container">
        <h3>Formulário 2 </h3>
        <div class="row g-5 mb-3 mt-3">
            <div class="col-1">
                <label class="form-label fw-bold">Código</label>
                <input class="form-control bg-body-secondary rounded-0 text-center" placeholder="32">
            </div>
            <div class="col-5">
                <label class="form-label fw-bold">Nome</label>
                <input class="form-control rounded-0" placeholder="Nome Completo do Cliente">
            </div>
            <div class="col-4">
                <label class="form-label fw-bold">E-mail</label>
                <input class="form-control rounded-0" placeholder="cliente@dominio.com">
            </div>
            <div class="col-2">
                <label class="form-label fw-bold">CPF</label>
                <input class="form-control rounded-0" placeholder="Só números">
            </div>
        </div>
        <div class="row g-5 mb-3">
            <div class="col-2">
                <label class="form-label fw-bold">Nº Celular</label>
                <input class="form-control rounded-0" placeholder="Nº do celular">
            </div>
            <div class="col-2">
                <label class="form-label fw-bold">Nº Telefone fixo</label>
                <input class="form-control rounded-0" placeholder="Nº telefone">
            </div>
            <div class="col-2">
                <label class="form-label fw-bold">CEP</label>
                <input class="form-control rounded-0" placeholder="ex: 88308070">
            </div>
            <div class="col-2">
                <label class="form-label fw-bold">Logradouro</label>
                <input class="form-control rounded-0" placeholder="ex: Rua 1400">
            </div>
            <div class="col-1">
                <label class="form-label fw-bold">N°</label>
                <input class="form-control rounded-0" placeholder="N°">
            </div>
            <div class="col-3">
                <label class="form-label fw-bold">Bairro</label>
                <input class="form-control rounded-0" placeholder="Bairro">
            </div>
        </div>
        <div class="row g-5 mb-3">
            <div class="col-3">
                <label class="form-label fw-bold">Cidade</label>
                <input class="form-control rounded-0" placeholder="Cidade">
            </div>
            <div class="col-1">
                <label class="form-label fw-bold">UF</label>
                <input class="form-control rounded-0" placeholder="UF">
            </div>
            <div class="col-2">
                <label class="form-label fw-bold">Status</label>
                <select class="form-select rounded-0">
                    <option selected>Selecione</option>
                </select>
            </div>
        </div>
        <div class="text-end">
                <button type="button" class="btn btn-danger rounded-0">Resetar</button>
                <button type="button" class="btn btn-success rounded-0">Próximo</button>
        </div>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
