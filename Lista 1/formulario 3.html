<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fomulario 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <main class="container">
        <h1 class=text-center>Sample Form</h1>
        
        <div class="row g-5 mb-3 align-items-center">
            <label class="col-2 col-form-label fw-bold text-end">Partner Name</label>
            <div class="col-4">
                <input class="form-control">
            </div>
            <label class="col-2 col-form-label fw-bold text-end">Partner Email ID</label>
            <div class="col-4">
                <input class="form-control">
            </div>
        </div>
        <div class="row g-5 mb-2 align-items-center">
            <label class="col-2 col-form-label fw-bold text-end">Partner Legal<br>Name</label>
            <div class="col-4">
                <input class="form-control">
            </div>
            <label class="col-2 col-form-label fw-bold text-end">Partner Mobile</label>
            <div class="col-4">
                <input class="form-control">
            </div>
        </div>
        <div class="row mt-4 mb-2">
            <label class="col-2 col-form-label fw-bold text-end">Partner Address</label>
            <div class="col-10">
                <textarea class="form-control" rows="3"></textarea>
            </div>
        </div>
        <div class="row g-5 mb-2 align-items-center">
            <label class="col-2 col-form-label fw-bold text-end">Contract Start<br>Date</label>
            <div class="col-4">
                <input class="form-control" placeholder="Date Start">
            </div>
            <label class="col-2 col-form-label fw-bold text-end">Contract Expiry<br>Date</label>
            <div class="col-4">
                <input class="form-control" placeholder="Date End">
            </div>
        </div>
        <div class="row g-5 mb-2 align-items-center">
            <label class="col-2 col-form-label fw-bold text-end">Minimum Loan<br>Amount</label>
            <div class="col-4">
                <input class="form-control">
            </div>
            <label class="col-2 col-form-label fw-bold text-end">Maximum Loan<br>Amount</label>
            <div class="col-4">
                <input class="form-control">
            </div>
        </div>
        <div class="row g-5 mb-3 align-items-center">
            <label class="col-2 col-form-label fw-bold text-end">Interest Rate</label>
            <div class="col-4">
                <input class="form-control">
            </div>
            <label class="col-2 col-form-label fw-bold text-end">Deposit Amount</label>
            <div class="col-4">
                <input class="form-control">
            </div>
        </div>
        <div class="text-center">
            <button class="btn btn-primary">Save</button>
        </div>
    </main>
</body>
</html>
